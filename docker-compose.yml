# =============================================================================
# docker-compose.yml  —  xray-docker
#
# Quick start:
#   1. cp .env.example .env
#   2. Edit .env  (at minimum: change TTYD_CREDENTIAL)
#   3. docker compose up -d
#   4. Open  http://<your-server-ip>:7681  in a browser
#   5. Follow the xray.sh wizard to complete setup
#
# Ports:
#   7681  — ttyd web terminal  (your browser-based configuration UI)
#   80    — nginx              (Let's Encrypt ACME challenge + HTTP redirect)
#   443   — nginx / XRAY       (HTTPS + VLESS proxy endpoint)
#
# All configuration, certificates, and generated files are written to
# ./data/ on the host. The container can be stopped, upgraded, and moved
# without losing your setup.
# =============================================================================

services:
  xray:
    build:
      context: .
      dockerfile: Dockerfile
      # Pin the ttyd version at build time.
      # Override with:  docker compose build --build-arg TTYD_VERSION=x.y.z
      args:
        TTYD_VERSION: "1.7.3"

    # To use a pre-built image from a registry instead of building locally:
    # image: yourrepo/xray-docker:latest

    container_name: xray

    # Restart automatically after a host reboot or crash.
    # Change to "no" during initial troubleshooting if needed.
    restart: unless-stopped

    # Load variables from .env (copy from .env.example first)
    env_file:
      - .env

    # -------------------------------------------------------------------------
    # Port mappings  (host:container)
    #
    # Bridge networking is used (Docker's default). The container is fully
    # isolated; these three ports are explicitly published to the host.
    #
    # If another service already uses port 80 or 443 on the host, change the
    # HOST side only — e.g. "8080:80" — and point your reverse proxy at that.
    # -------------------------------------------------------------------------
    ports:
      - "7681:7681"   # ttyd admin terminal  (browser setup UI)
      - "80:80"       # nginx HTTP           (ACME challenge + redirect to HTTPS)
      - "443:443"     # nginx HTTPS          (VLESS/WS/TLS endpoint)

    # -------------------------------------------------------------------------
    # Persistent volumes  —  everything that must survive container recreation
    #
    # Laid out under ./data/ so a full backup is just:  tar czf backup.tar.gz data/
    # Move to another server by copying the entire project directory.
    #
    # NOTE: The XRAY binary (/usr/local/bin/xray) is NOT persisted here because
    # mounting /usr/local/bin would shadow ttyd and curl inside the container.
    # Instead, entrypoint.sh detects a missing binary on startup and re-runs the
    # official XTLS installer automatically (~5 seconds). All config, certs, and
    # client UUIDs come from these volumes and are fully preserved.
    # -------------------------------------------------------------------------
    volumes:
      # -- xray.sh state -------------------------------------------------------
      # domain, ports, WS path, branding, ACME method, client label -> UUID map
      - ./data/xray-setup:/etc/xray-setup

      # -- TLS certificates ----------------------------------------------------
      # Issued by Let's Encrypt; renewed automatically by cron inside container.
      # Preserving these means you keep your cert across container rebuilds and
      # never hit Let's Encrypt rate limits.
      - ./data/letsencrypt:/etc/letsencrypt

      # -- XRAY server config --------------------------------------------------
      # config.json (inbounds, WS path, client UUIDs, routing rules).
      # Also contains geoip.dat / geosite.dat written by the XTLS installer.
      - ./data/xray-config:/usr/local/etc/xray

      # -- Nginx site configs --------------------------------------------------
      # Written by xray.sh; one file per domain in sites-available,
      # symlinked into sites-enabled.
      - ./data/nginx/sites-available:/etc/nginx/sites-available
      - ./data/nginx/sites-enabled:/etc/nginx/sites-enabled

      # -- Decoy website -------------------------------------------------------
      # HTML files generated by xray.sh (the fake tech-company landing page).
      - ./data/www:/var/www

      # -- Logs ----------------------------------------------------------------
      # Optional but useful for debugging. Scoped to nginx and xray only:
      # do NOT mount all of /var/log or you shadow cron/apt/syslog inside
      # the container.
      - ./data/logs/nginx:/var/log/nginx
      - ./data/logs/xray:/var/log/xray

    # -------------------------------------------------------------------------
    # Health check — confirms ttyd is serving the browser terminal
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${TTYD_PORT:-7681}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
